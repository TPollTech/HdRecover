name: Publicar fonte auditada

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extrair fonte auditada
        shell: bash
        run: |
          set -euo pipefail
          tar -xJf hdrecover-source-0.5.4.tar.xz
          rm -f hdrecover-source-0.5.4.tar.xz
          rm -f .github/workflows/bootstrap.yml

      - name: Commitar fonte auditada na main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: auditoria completa e endurecimento de segurança 0.5.4"
          git push origin HEAD:main
